AWSTemplateFormatVersion: '2010-09-09'
Description: AI QA Test Engine — AgentCore with CodeBuild (no local Docker needed)

Parameters:
  ProjectName:
    Type: String
    Default: ai-qa-test-engine
    Description: Project name for resource naming

  NetworkMode:
    Type: String
    Default: PUBLIC
    AllowedValues: [PUBLIC, PRIVATE]

  TestBucket:
    Type: String
    Default: ''
    Description: (Optional) Existing S3 bucket for test I/O

  ExistingRoleArn:
    Type: String
    Default: ''
    Description: (Optional) Pre-created AgentCore execution role ARN

  ExistingCodeBuildRoleArn:
    Type: String
    Default: ''
    Description: (Optional) Pre-created CodeBuild role ARN

  ExistingCustomResourceRoleArn:
    Type: String
    Default: ''
    Description: (Optional) Pre-created Custom Resource Lambda role ARN

  SourceBucket:
    Type: String
    Default: ''
    Description: S3 bucket containing agent source zips (set by deploy.sh)

  SubnetIds:
    Type: CommaDelimitedList
    Default: ''
    Description: (VPC mode only) Comma-separated private subnet IDs

  SecurityGroupIds:
    Type: CommaDelimitedList
    Default: ''
    Description: (VPC mode only) Comma-separated security group IDs

Conditions:
  CreateBucket: !Equals [!Ref TestBucket, '']
  CreateRole: !Equals [!Ref ExistingRoleArn, '']
  CreateCodeBuildRole: !Equals [!Ref ExistingCodeBuildRoleArn, '']
  CreateCustomResourceRole: !Equals [!Ref ExistingCustomResourceRoleArn, '']
  IsVPC: !Equals [!Ref NetworkMode, 'PRIVATE']

Resources:
  # ============================================================
  # S3 Bucket (optional)
  # ============================================================
  TestDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateBucket
    Properties:
      BucketName: !Sub '${ProjectName}-tests-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ============================================================
  # ECR Repositories
  # ============================================================
  TestRunnerECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RepositoryName: !Sub '${AWS::StackName}-test-runner'
      ImageTagMutability: MUTABLE
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true

  OrchestratorECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RepositoryName: !Sub '${AWS::StackName}-orchestrator'
      ImageTagMutability: MUTABLE
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true

  # ============================================================
  # IAM — AgentCore Execution Role
  # ============================================================
  AgentCoreExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateRole
    Properties:
      RoleName: !Sub '${ProjectName}-agentcore-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/BedrockAgentCoreFullAccess
      Policies:
        - PolicyName: TestEnginePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:ListBucket, s3:HeadObject]
                Resource: '*'
              - Sid: BedrockAccess
                Effect: Allow
                Action: [bedrock:InvokeModel, bedrock:InvokeModelWithResponseStream]
                Resource: '*'
              - Sid: AgentCoreInvoke
                Effect: Allow
                Action: [bedrock-agentcore:InvokeAgentRuntime]
                Resource: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*'
              - Sid: NovaAct
                Effect: Allow
                Action: ['nova-act:*']
                Resource: '*'
              - Sid: Browser
                Effect: Allow
                Action: [bedrock-agentcore:CreateBrowserSession, bedrock-agentcore:GetBrowserSession, bedrock-agentcore:StopBrowserSession]
                Resource: '*'
              - Sid: ECR
                Effect: Allow
                Action: [ecr:BatchGetImage, ecr:GetDownloadUrlForLayer, ecr:BatchCheckLayerAvailability, ecr:GetAuthorizationToken]
                Resource: '*'
              - Sid: Logs
                Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents, logs:DescribeLogGroups, logs:DescribeLogStreams]
                Resource: '*'
              - Sid: XRay
                Effect: Allow
                Action: [xray:PutTraceSegments, xray:PutTelemetryRecords, xray:GetSamplingRules, xray:GetSamplingTargets]
                Resource: '*'
              - Sid: SecretsManager
                Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource: '*'

  # ============================================================
  # IAM — CodeBuild Role
  # ============================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Condition: CreateCodeBuildRole
    Properties:
      RoleName: !Sub '${ProjectName}-codebuild-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*'
              - Effect: Allow
                Action: [ecr:BatchCheckLayerAvailability, ecr:GetDownloadUrlForLayer, ecr:BatchGetImage, ecr:GetAuthorizationToken, ecr:PutImage, ecr:InitiateLayerUpload, ecr:UploadLayerPart, ecr:CompleteLayerUpload]
                Resource: '*'
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource: '*'

  # ============================================================
  # IAM — Lambda Custom Resource Role
  # ============================================================
  CustomResourceRole:
    Type: AWS::IAM::Role
    Condition: CreateCustomResourceRole
    Properties:
      RoleName: !Sub '${ProjectName}-custom-resource-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CustomResourcePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [codebuild:StartBuild, codebuild:BatchGetBuilds, codebuild:BatchGetProjects]
                Resource: !Sub 'arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ProjectName}-*'

  # ============================================================
  # Lambda — CodeBuild Trigger (Custom Resource)
  # ============================================================
  CodeBuildTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-codebuild-trigger'
      Handler: index.handler
      Role: !If [CreateCustomResourceRole, !GetAtt CustomResourceRole.Arn, !Ref ExistingCustomResourceRoleArn]
      Runtime: python3.11
      Timeout: 900
      Code:
        ZipFile: |
          import boto3, json, logging, time
          from urllib.request import urlopen, Request
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          def send(event, context, status, data={}):
              body = json.dumps({"Status": status, "Reason": str(data.get("Error","OK")), "PhysicalResourceId": context.log_stream_name, "StackId": event["StackId"], "RequestId": event["RequestId"], "LogicalResourceId": event["LogicalResourceId"], "Data": data}).encode()
              req = Request(event["ResponseURL"], data=body, headers={"Content-Type":""}, method="PUT")
              urlopen(req)
          def handler(event, context):
              logger.info(json.dumps(event))
              try:
                  if event['RequestType'] == 'Delete':
                      send(event, context, "SUCCESS")
                      return
                  project_name = event['ResourceProperties']['ProjectName']
                  codebuild = boto3.client('codebuild')
                  response = codebuild.start_build(projectName=project_name)
                  build_id = response['build']['id']
                  logger.info(f"Started build: {build_id}")
                  max_wait = context.get_remaining_time_in_millis() / 1000 - 30
                  start = time.time()
                  while True:
                      if time.time() - start > max_wait:
                          send(event, context, "FAILED", {"Error": "Build timed out"})
                          return
                      r = codebuild.batch_get_builds(ids=[build_id])
                      status = r['builds'][0]['buildStatus']
                      if status == 'SUCCEEDED':
                          send(event, context, "SUCCESS", {"BuildId": build_id})
                          return
                      elif status in ['FAILED', 'FAULT', 'STOPPED', 'TIMED_OUT']:
                          send(event, context, "FAILED", {"Error": f"Build {status}"})
                          return
                      time.sleep(15)
              except Exception as e:
                  logger.error(str(e))
                  send(event, context, "FAILED", {"Error": str(e)})

  # ============================================================
  # CodeBuild — Test Runner Image
  # ============================================================
  TestRunnerBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-test-runner-build'
      ServiceRole: !If [CreateCodeBuildRole, !GetAtt CodeBuildRole.Arn, !Ref ExistingCodeBuildRoleArn]
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: IMAGE_REPO_NAME
            Value: !Ref TestRunnerECR
          - Name: IMAGE_TAG
            Value: latest
          - Name: SOURCE_BUCKET
            Value: !Ref SourceBucket
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
            build:
              commands:
                - echo "Downloading source from S3..."
                - aws s3 cp s3://$SOURCE_BUCKET/source/agentcore-runner.zip /tmp/source.zip
                - unzip -o /tmp/source.zip -d .
                - |
                  cat > Dockerfile << 'EOF'
                  FROM public.ecr.aws/docker/library/python:3.13-slim
                  WORKDIR /app
                  COPY requirements.txt .
                  RUN pip install --no-cache-dir -r requirements.txt
                  # Install core engine from bundled source
                  COPY src/ /tmp/core-src/src/
                  COPY pyproject.toml /tmp/core-src/
                  RUN pip install --no-cache-dir /tmp/core-src/ && rm -rf /tmp/core-src
                  RUN useradd -m -u 1000 bedrock_agentcore
                  USER bedrock_agentcore
                  EXPOSE 8080
                  COPY main.py scenario_executor.py s3_utils.py ./
                  CMD ["opentelemetry-instrument", "python", "main.py"]
                  EOF
                - |
                  cat > requirements.txt << 'EOF'
                  bedrock-agentcore>=1.0.3
                  boto3
                  nova-act
                  pydantic>=2.0
                  pydantic-settings>=2.0
                  python-dotenv>=1.0.0
                  gherkin-official>=28.0.0
                  openpyxl>=3.1.0
                  strands-agents>=1.0
                  aws-opentelemetry-distro
                  EOF
                - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
                - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
            post_build:
              commands:
                - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG

  # ============================================================
  # CodeBuild — Orchestrator Image
  # ============================================================
  OrchestratorBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-orchestrator-build'
      ServiceRole: !If [CreateCodeBuildRole, !GetAtt CodeBuildRole.Arn, !Ref ExistingCodeBuildRoleArn]
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/amazonlinux2-aarch64-standard:3.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: IMAGE_REPO_NAME
            Value: !Ref OrchestratorECR
          - Name: IMAGE_TAG
            Value: latest
          - Name: SOURCE_BUCKET
            Value: !Ref SourceBucket
      Source:
        Type: NO_SOURCE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
            build:
              commands:
                - echo "Downloading source from S3..."
                - aws s3 cp s3://$SOURCE_BUCKET/source/agentcore-orchestrator.zip /tmp/source.zip
                - unzip -o /tmp/source.zip -d .
                - |
                  cat > Dockerfile << 'EOF'
                  FROM public.ecr.aws/docker/library/python:3.13-slim
                  WORKDIR /app
                  COPY requirements.txt .
                  RUN pip install --no-cache-dir -r requirements.txt
                  RUN useradd -m -u 1000 bedrock_agentcore
                  USER bedrock_agentcore
                  EXPOSE 8080
                  COPY . .
                  CMD ["opentelemetry-instrument", "python", "main.py"]
                  EOF
                - |
                  cat > requirements.txt << 'EOF'
                  bedrock-agentcore>=1.0.3
                  boto3
                  aws-opentelemetry-distro
                  EOF
                - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
                - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
            post_build:
              commands:
                - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG

  # ============================================================
  # Custom Resources — Trigger CodeBuild
  # ============================================================
  TriggerTestRunnerBuild:
    Type: Custom::CodeBuildTrigger
    DependsOn: [TestRunnerECR, TestRunnerBuildProject, CodeBuildTriggerFunction]
    Properties:
      ServiceToken: !GetAtt CodeBuildTriggerFunction.Arn
      ProjectName: !Ref TestRunnerBuildProject
      WaitForCompletion: 'true'

  TriggerOrchestratorBuild:
    Type: Custom::CodeBuildTrigger
    DependsOn: [OrchestratorECR, OrchestratorBuildProject, CodeBuildTriggerFunction]
    Properties:
      ServiceToken: !GetAtt CodeBuildTriggerFunction.Arn
      ProjectName: !Ref OrchestratorBuildProject
      WaitForCompletion: 'true'

  # ============================================================
  # AgentCore Runtimes (Container-based)
  # ============================================================
  TestRunnerRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn: TriggerTestRunnerBuild
    Properties:
      AgentRuntimeName: !Sub
        - '${S}_test_runner'
        - S: !Join ['_', !Split ['-', !Ref ProjectName]]
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Sub '${TestRunnerECR.RepositoryUri}:latest'
      RoleArn: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]
      NetworkConfiguration:
        NetworkMode: !Ref NetworkMode
        SubnetIds: !If [IsVPC, !Ref SubnetIds, !Ref 'AWS::NoValue']
        SecurityGroupIds: !If [IsVPC, !Ref SecurityGroupIds, !Ref 'AWS::NoValue']
      Description: 'AI QA Test Engine — Test Runner'
      EnvironmentVariables: !If
        - IsVPC
        - BROWSER_IDENTIFIER: !Sub '${ProjectName}-vpc-browser'
        - !Ref 'AWS::NoValue'

  OrchestratorRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn: [TriggerOrchestratorBuild, TestRunnerRuntime]
    Properties:
      AgentRuntimeName: !Sub
        - '${S}_orchestrator'
        - S: !Join ['_', !Split ['-', !Ref ProjectName]]
      AgentRuntimeArtifact:
        ContainerConfiguration:
          ContainerUri: !Sub '${OrchestratorECR.RepositoryUri}:latest'
      RoleArn: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]
      NetworkConfiguration:
        NetworkMode: !Ref NetworkMode
        SubnetIds: !If [IsVPC, !Ref SubnetIds, !Ref 'AWS::NoValue']
        SecurityGroupIds: !If [IsVPC, !Ref SecurityGroupIds, !Ref 'AWS::NoValue']
      Description: 'AI QA Test Engine — Orchestrator'
      EnvironmentVariables:
        TEST_RUNNER_ARN: !GetAtt TestRunnerRuntime.AgentRuntimeArn

  # ============================================================
  # AgentCore Browser (VPC mode only)
  # ============================================================
  VPCBrowser:
    Type: AWS::BedrockAgentCore::Browser
    Condition: IsVPC
    Properties:
      Name: !Sub '${ProjectName}-vpc-browser'
      Description: 'AI QA Test Engine — VPC Browser for internal app testing'
      NetworkConfiguration:
        NetworkMode: VPC
        NetworkModeConfig:
          Subnets: !Ref SubnetIds
          SecurityGroups: !Ref SecurityGroupIds
      ExecutionRoleArn: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]


Outputs:
  TestRunnerArn:
    Description: Test Runner runtime ARN
    Value: !GetAtt TestRunnerRuntime.AgentRuntimeArn
    Export:
      Name: !Sub '${ProjectName}-test-runner-arn'

  OrchestratorArn:
    Description: Orchestrator runtime ARN (invoke this to run tests)
    Value: !GetAtt OrchestratorRuntime.AgentRuntimeArn
    Export:
      Name: !Sub '${ProjectName}-orchestrator-arn'

  TestBucketName:
    Description: S3 bucket for test input/output
    Value: !If [CreateBucket, !Ref TestDataBucket, !Ref TestBucket]

  ExecutionRoleArn:
    Description: IAM role ARN used by runtimes
    Value: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]

  TestRunnerECRUri:
    Description: ECR repository URI for Test Runner
    Value: !GetAtt TestRunnerECR.RepositoryUri

  OrchestratorECRUri:
    Description: ECR repository URI for Orchestrator
    Value: !GetAtt OrchestratorECR.RepositoryUri

  BrowserIdentifier:
    Condition: IsVPC
    Description: VPC Browser identifier for internal app testing
    Value: !Sub '${ProjectName}-vpc-browser'
