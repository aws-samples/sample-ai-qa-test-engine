AWSTemplateFormatVersion: '2010-09-09'
Description: AI QA Test Engine — AgentCore Infrastructure (Orchestrator + Test Runner)

Parameters:
  ProjectName:
    Type: String
    Default: ai-qa-test-engine
    Description: Project name used for resource naming

  NetworkMode:
    Type: String
    Default: PUBLIC
    AllowedValues: [PUBLIC, PRIVATE]
    Description: Network mode for AgentCore runtimes

  TestRunnerCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Test Runner code zip

  TestRunnerCodeS3Key:
    Type: String
    Default: deploy/test-runner.zip
    Description: S3 key for the Test Runner code zip

  OrchestratorCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Orchestrator code zip

  OrchestratorCodeS3Key:
    Type: String
    Default: deploy/orchestrator.zip
    Description: S3 key for the Orchestrator code zip

  TestBucket:
    Type: String
    Default: ''
    Description: (Optional) Existing S3 bucket for test I/O. If empty, a new bucket is created.

  ExistingRoleArn:
    Type: String
    Default: ''
    Description: (Optional) ARN of a pre-created IAM role. If empty, a new role is created.

Conditions:
  CreateBucket: !Equals [!Ref TestBucket, '']
  CreateRole: !Equals [!Ref ExistingRoleArn, '']

Resources:
  # ============================================================
  # S3 Bucket (optional — created only if TestBucket is empty)
  # ============================================================
  TestDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateBucket
    Properties:
      BucketName: !Sub '${ProjectName}-tests-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ============================================================
  # IAM Role (optional — created only if ExistingRoleArn is empty)
  # ============================================================
  AgentCoreExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateRole
    Properties:
      RoleName: !Sub '${ProjectName}-agentcore-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/BedrockAgentCoreFullAccess
      Policies:
        - PolicyName: TestEnginePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:HeadObject
                Resource:
                  - !If [CreateBucket, !GetAtt TestDataBucket.Arn, !Sub 'arn:aws:s3:::${TestBucket}']
                  - !If [CreateBucket, !Sub '${TestDataBucket.Arn}/*', !Sub 'arn:aws:s3:::${TestBucket}/*']
              - Sid: BedrockModelAccess
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Sid: AgentCoreInvoke
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource: !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*'
              - Sid: NovaAct
                Effect: Allow
                Action:
                  - nova-act:*
                Resource: '*'
              - Sid: AgentCoreBrowser
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateBrowserSession
                  - bedrock-agentcore:GetBrowserSession
                  - bedrock-agentcore:StopBrowserSession
                Resource: '*'
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
              - Sid: XRayTracing
                Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: '*'
              - Sid: GetAgentAccessToken
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetWorkloadAccessToken
                  - bedrock-agentcore:GetWorkloadAccessTokenForJWT
                  - bedrock-agentcore:GetWorkloadAccessTokenForUserId
                Resource:
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default'
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/*'

  # ============================================================
  # Test Runner Runtime (CodeZip — uses AgentCore browser_session)
  # ============================================================
  TestRunnerRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    Properties:
      AgentRuntimeName: !Sub
        - '${StackUnderscore}_test_runner'
        - StackUnderscore: !Join ['_', !Split ['-', !Ref ProjectName]]
      AgentRuntimeArtifact:
        CodeConfiguration:
          Code:
            S3:
              Bucket: !Ref TestRunnerCodeS3Bucket
              Prefix: !Ref TestRunnerCodeS3Key
          Runtime: PYTHON_3_13
          EntryPoint:
            - main.py
      RoleArn: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]
      NetworkConfiguration:
        NetworkMode: !Ref NetworkMode
      Description: 'AI QA Test Engine — Test Runner (executes scenarios with AgentCore browser)'

  # ============================================================
  # Orchestrator Runtime (CodeZip — fans out parallel invocations)
  # ============================================================
  OrchestratorRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    DependsOn: TestRunnerRuntime
    Properties:
      AgentRuntimeName: !Sub
        - '${StackUnderscore}_orchestrator'
        - StackUnderscore: !Join ['_', !Split ['-', !Ref ProjectName]]
      AgentRuntimeArtifact:
        CodeConfiguration:
          Code:
            S3:
              Bucket: !Ref OrchestratorCodeS3Bucket
              Prefix: !Ref OrchestratorCodeS3Key
          Runtime: PYTHON_3_13
          EntryPoint:
            - main.py
      RoleArn: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]
      NetworkConfiguration:
        NetworkMode: !Ref NetworkMode
      Description: 'AI QA Test Engine — Orchestrator (parallel test execution from S3)'
      EnvironmentVariables:
        TEST_RUNNER_ARN: !GetAtt TestRunnerRuntime.AgentRuntimeArn

Outputs:
  TestRunnerRuntimeId:
    Description: Test Runner runtime ID
    Value: !GetAtt TestRunnerRuntime.AgentRuntimeId

  TestRunnerArn:
    Description: Test Runner runtime ARN (pass to orchestrator payload)
    Value: !GetAtt TestRunnerRuntime.AgentRuntimeArn
    Export:
      Name: !Sub '${ProjectName}-test-runner-arn'

  OrchestratorRuntimeId:
    Description: Orchestrator runtime ID
    Value: !GetAtt OrchestratorRuntime.AgentRuntimeId

  OrchestratorArn:
    Description: Orchestrator runtime ARN (invoke this to run tests)
    Value: !GetAtt OrchestratorRuntime.AgentRuntimeArn
    Export:
      Name: !Sub '${ProjectName}-orchestrator-arn'

  TestBucketName:
    Description: S3 bucket for test input/output
    Value: !If [CreateBucket, !Ref TestDataBucket, !Ref TestBucket]

  ExecutionRoleArn:
    Description: IAM role ARN used by runtimes
    Value: !If [CreateRole, !GetAtt AgentCoreExecutionRole.Arn, !Ref ExistingRoleArn]

  InvokeExample:
    Description: Example command to invoke the orchestrator
    Value: !Sub
      - |
        aws bedrock-agentcore invoke-agent-runtime --agent-runtime-arn ${OrchestratorArn} --payload '{"input_bucket":"${Bucket}","input_prefix":"my-project/tests/","output_bucket":"${Bucket}","output_prefix":"my-project/results","test_runner_arn":"${RunnerArn}","max_concurrency":10}'
      - OrchestratorArn: !GetAtt OrchestratorRuntime.AgentRuntimeArn
        RunnerArn: !GetAtt TestRunnerRuntime.AgentRuntimeArn
        Bucket: !If [CreateBucket, !Ref TestDataBucket, !Ref TestBucket]
