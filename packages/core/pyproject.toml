[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-qa-test-engine"
version = "0.1.0"
description = "AI-powered QA test execution engine - Core package"
requires-python = ">=3.13"
dependencies = [
    "nova-act",
    "strands-agents>=1.0",
    "gherkin-official>=28.0.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "python-dotenv>=1.0.0",
    "openpyxl>=3.1.0",
    "Pillow>=10.0.0",
    "boto3",
    "questionary>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ai_qa_test_engine"]
